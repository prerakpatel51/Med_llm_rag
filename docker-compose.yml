##############################################################################
# docker-compose.yml – primary deployment file
#
# Services:
#   postgres    – PostgreSQL 16 with pgvector extension
#   (LLM via Groq API – Llama 3.1 70B, no local GPU needed)
#   backend     – FastAPI application
#   frontend    – Next.js application
#
# Start everything:   docker compose up -d
# View logs:          docker compose logs -f backend
# Stop:               docker compose down
##############################################################################

services:

  # ── PostgreSQL with pgvector ──────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16   # official image with pgvector pre-installed
    container_name: medlit-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-medlit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-medlit}
      POSTGRES_DB: ${POSTGRES_DB:-medlit}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"   # expose for local debugging; remove in production
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-medlit}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - medlit-net
    # Tune PostgreSQL for 512 MB RAM (fits on t3.medium)
    command: >
      postgres
      -c shared_buffers=128MB
      -c effective_cache_size=256MB
      -c work_mem=4MB
      -c maintenance_work_mem=64MB
      -c max_connections=50

  # ── FastAPI backend ───────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: medlit-backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-medlit}:${POSTGRES_PASSWORD:-medlit}@postgres:5432/${POSTGRES_DB:-medlit}
      GROQ_API_KEY: ${GROQ_API_KEY}
      LLM_MODEL: ${LLM_MODEL:-llama-3.3-70b-versatile}
    volumes:
      # Cache the embedding model so it only downloads once
      - hf_cache:/app/hf-cache
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - medlit-net

  # ── Next.js frontend ──────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: medlit-frontend
    restart: unless-stopped
    environment:
      BACKEND_URL: http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - medlit-net

# ── Persistent volumes ────────────────────────────────────────────────────────
volumes:
  postgres_data:
  hf_cache:          # embedding model cache (all-MiniLM-L6-v2, ~90 MB, downloads once)


# ── Internal network ──────────────────────────────────────────────────────────
networks:
  medlit-net:
    driver: bridge
