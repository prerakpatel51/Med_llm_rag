apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: medlit
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: your-registry/medlit-backend:latest  # replace with your image
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: medlit-config
            - secretRef:
                name: medlit-secrets
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 5
