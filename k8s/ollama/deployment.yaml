apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: medlit
spec:
  replicas: 1   # Do not scale Ollama horizontally (CPU-bound, no GPU)
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      initContainers:
        # Pull the model on first start. Subsequent starts reuse the PVC cache.
        - name: pull-model
          image: ollama/ollama:latest
          command: ["/bin/sh", "-c", "ollama pull gemma3:1b"]
          env:
            - name: OLLAMA_HOST
              value: "0.0.0.0"
          volumeMounts:
            - name: ollama-data
              mountPath: /root/.ollama
      containers:
        - name: ollama
          image: ollama/ollama:latest
          ports:
            - containerPort: 11434
          resources:
            requests:
              memory: "2Gi"
              cpu: "500m"
            limits:
              memory: "4Gi"
              cpu: "2000m"
          volumeMounts:
            - name: ollama-data
              mountPath: /root/.ollama
          readinessProbe:
            httpGet:
              path: /api/tags
              port: 11434
            initialDelaySeconds: 30
            periodSeconds: 15
      volumes:
        - name: ollama-data
          persistentVolumeClaim:
            claimName: ollama-pvc
