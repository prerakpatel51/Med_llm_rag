apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: medlit
spec:
  selector:
    app: ollama
  ports:
    - port: 11434
      targetPort: 11434
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-pvc
  namespace: medlit
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi   # Gemma 3 1B Q4_K_M ≈ 800 MB; 5 Gi leaves room for future models
