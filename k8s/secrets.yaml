# secrets.yaml – TEMPLATE ONLY. Do NOT commit real secrets.
# In production use: AWS Secrets Manager CSI driver, Sealed Secrets, or Vault.
#
# To create the secret manually:
#   kubectl create secret generic medlit-secrets -n medlit \
#     --from-literal=POSTGRES_PASSWORD=your-password \
#     --from-literal=NCBI_API_KEY=your-key \
#     --from-literal=GF_SECURITY_ADMIN_PASSWORD=your-grafana-password
apiVersion: v1
kind: Secret
metadata:
  name: medlit-secrets
  namespace: medlit
type: Opaque
stringData:
  POSTGRES_USER: "medlit"
  POSTGRES_PASSWORD: "REPLACE_ME"
  POSTGRES_DB: "medlit"
  NCBI_API_KEY: ""
  GF_SECURITY_ADMIN_PASSWORD: "REPLACE_ME"
