apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: medlit
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: your-registry/medlit-frontend:latest  # replace with your image
          ports:
            - containerPort: 3000
          env:
            - name: BACKEND_URL
              value: "http://backend:8000"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: medlit
spec:
  selector:
    app: frontend
  ports:
    - port: 3000
      targetPort: 3000
