apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: medlit-ingress
  namespace: medlit
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    # Uncomment for TLS with cert-manager:
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  rules:
    - host: medlit.example.com   # replace with your domain
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 3000
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8000
          - path: /health
            pathType: Exact
            backend:
              service:
                name: backend
                port:
                  number: 8000
          - path: /metrics
            pathType: Exact
            backend:
              service:
                name: backend
                port:
                  number: 8000
          - path: /grafana
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 3000
  # Uncomment for TLS:
  # tls:
  #   - hosts:
  #       - medlit.example.com
  #     secretName: medlit-tls
