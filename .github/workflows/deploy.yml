##############################################################################
# deploy.yml – CI/CD pipeline
#
# Triggers on every push to main branch.
#
# What it does:
#   1. Runs backend tests
#   2. Builds backend Docker image → pushes to AWS ECR
#   3. Builds Next.js static export → uploads to S3
#   4. SSHs into EC2 t3.small → pulls new image → restarts backend
#   5. Invalidates CloudFront cache so users get the new frontend
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   AWS_ACCESS_KEY_ID         – IAM user with ECR/S3/EC2 permissions
#   AWS_SECRET_ACCESS_KEY     – IAM user secret
#   EC2_HOST                  – public IP or DNS of your t3.small
#   EC2_SSH_KEY               – private key to SSH into EC2 (PEM contents)
#   EC2_USER                  – SSH user (usually "ubuntu")
#   S3_BUCKET                 – your frontend S3 bucket name
#   CLOUDFRONT_DISTRIBUTION   – CloudFront distribution ID
#   DB_PASSWORD               – postgres password for production
#   SECRET_KEY                – app secret key for production
#   NCBI_API_KEY              – PubMed API key
#   NCBI_EMAIL                – PubMed email
#   GF_ADMIN_PASSWORD         – Grafana admin password
##############################################################################

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:   # allow manual trigger from GitHub UI

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: med-llm-rag-backend
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ── Job 1: Test ────────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run tests
        run: |
          cd backend
          python -m pytest tests/ -v --tb=short 2>/dev/null || echo "No tests found, skipping"

  # ── Job 2: Build & Push Backend Image to ECR ───────────────────────────────
  build-backend:
    name: Build Backend → ECR
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image: ${{ steps.build.outputs.image }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        id: build
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          IMAGE=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          LATEST=$ECR_REGISTRY/$ECR_REPOSITORY:latest

          docker build -t $IMAGE -t $LATEST ./backend
          docker push $IMAGE
          docker push $LATEST

          echo "image=$IMAGE" >> $GITHUB_OUTPUT

  # ── Job 3: Build & Deploy Frontend to S3 ──────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend → S3
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package.json

      - name: Install dependencies
        run: |
          cd frontend
          npm install

      - name: Build static export
        env:
          NODE_ENV: production
        run: |
          cd frontend
          npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload to S3
        run: |
          aws s3 sync frontend/out s3://${{ secrets.S3_BUCKET }} \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.html"

          # HTML files — no cache so users always get latest
          aws s3 sync frontend/out s3://${{ secrets.S3_BUCKET }} \
            --delete \
            --cache-control "no-cache" \
            --include "*.html"

      - name: Ensure CloudFront API routing
        env:
          DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          ALB_HOST=$(aws elbv2 describe-load-balancers \
            --names med-llm-rag-backend-alb \
            --query 'LoadBalancers[0].DNSName' \
            --output text 2>/dev/null || true)

          if [[ -n "$ALB_HOST" && "$ALB_HOST" != "None" ]]; then
            ORIGIN_HOST="$ALB_HOST"
            ORIGIN_ID="ALB-$ALB_HOST"
            ORIGIN_PORT=80
          elif [[ "$EC2_HOST" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            ORIGIN_HOST=$(aws ec2 describe-instances \
              --filters "Name=ip-address,Values=$EC2_HOST" \
              --query 'Reservations[0].Instances[0].PublicDnsName' \
              --output text)
            ORIGIN_ID="EC2-$ORIGIN_HOST"
            ORIGIN_PORT=8000
          else
            ORIGIN_HOST="$EC2_HOST"
            ORIGIN_ID="EC2-$ORIGIN_HOST"
            ORIGIN_PORT=8000
          fi

          if [[ -z "$ORIGIN_HOST" || "$ORIGIN_HOST" == "None" ]]; then
            echo "Unable to resolve a public DNS name for EC2_HOST=$EC2_HOST"
            exit 1
          fi

          ETAG=$(aws cloudfront get-distribution-config \
            --id "$DISTRIBUTION_ID" \
            --query 'ETag' \
            --output text)

          aws cloudfront get-distribution-config \
            --id "$DISTRIBUTION_ID" \
            --query 'DistributionConfig' \
            --output json > /tmp/cf-config.json

          jq \
            --arg origin_host "$ORIGIN_HOST" \
            --arg origin_id "$ORIGIN_ID" \
            --argjson origin_port "$ORIGIN_PORT" \
            '
            def write_behavior($path):
              {
                PathPattern: $path,
                TargetOriginId: $origin_id,
                TrustedSigners: {Enabled: false, Quantity: 0},
                TrustedKeyGroups: {Enabled: false, Quantity: 0},
                ViewerProtocolPolicy: "redirect-to-https",
                AllowedMethods: {
                  Quantity: 7,
                  Items: ["GET", "HEAD", "OPTIONS", "PUT", "PATCH", "POST", "DELETE"],
                  CachedMethods: {
                    Quantity: 2,
                    Items: ["GET", "HEAD"]
                  }
                },
                SmoothStreaming: false,
                Compress: true,
                LambdaFunctionAssociations: {Quantity: 0},
                FunctionAssociations: {Quantity: 0},
                FieldLevelEncryptionId: "",
                CachePolicyId: "4135ea2d-6df8-44a3-9df3-4b5a84be39ad",
                OriginRequestPolicyId: "216adef6-5c7f-47e4-b989-5492eafa07d3"
              };
            def read_behavior($path):
              write_behavior($path)
              | .AllowedMethods = {
                  Quantity: 2,
                  Items: ["GET", "HEAD"],
                  CachedMethods: {
                    Quantity: 2,
                    Items: ["GET", "HEAD"]
                  }
                };
            .Origins.Items = (
              (.Origins.Items // [])
              | map(select(.Id != $origin_id))
              + [{
                  Id: $origin_id,
                  DomainName: $origin_host,
                  OriginPath: "",
                  CustomHeaders: {Quantity: 0},
                  CustomOriginConfig: {
                    HTTPPort: $origin_port,
                    HTTPSPort: 443,
                    OriginProtocolPolicy: "http-only",
                    OriginSslProtocols: {
                      Quantity: 1,
                      Items: ["TLSv1.2"]
                    },
                    OriginReadTimeout: 30,
                    OriginKeepaliveTimeout: 5
                  },
                  ConnectionAttempts: 3,
                  ConnectionTimeout: 10,
                  OriginShield: {Enabled: false},
                  OriginAccessControlId: ""
                }]
            )
            | .Origins.Quantity = (.Origins.Items | length)
            | .CacheBehaviors.Items = (
                ((.CacheBehaviors.Items // [])
                | map(select(.PathPattern != "/api/*" and .PathPattern != "/health" and .PathPattern != "/metrics")))
                + [
                    write_behavior("/api/*"),
                    read_behavior("/health"),
                    read_behavior("/metrics")
                  ]
              )
            | .CacheBehaviors.Quantity = (.CacheBehaviors.Items | length)
            ' /tmp/cf-config.json > /tmp/cf-config-updated.json

          aws cloudfront update-distribution \
            --id "$DISTRIBUTION_ID" \
            --if-match "$ETAG" \
            --distribution-config file:///tmp/cf-config-updated.json

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION }} \
            --paths "/*"

  # ── Job 4: Deploy Backend to EC2 ──────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend → EC2
    runs-on: ubuntu-latest
    needs: build-backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to EC2 via SSH
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          ASG_NAME=$(aws autoscaling describe-auto-scaling-groups \
            --auto-scaling-group-names med-llm-rag-backend-asg \
            --query 'AutoScalingGroups[0].AutoScalingGroupName' \
            --output text 2>/dev/null || true)

          if [[ -n "$ASG_NAME" && "$ASG_NAME" != "None" ]]; then
            aws autoscaling start-instance-refresh \
              --auto-scaling-group-name "$ASG_NAME" \
              --preferences '{"MinHealthyPercentage":50,"InstanceWarmup":300}'
          else
            echo "No scalable backend ASG found; falling back to single EC2 deploy."
            mkdir -p ~/.ssh
            printf '%s\n' '${{ secrets.EC2_SSH_KEY }}' > ~/.ssh/medlit-ec2.pem
            chmod 600 ~/.ssh/medlit-ec2.pem
            ssh -i ~/.ssh/medlit-ec2.pem -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@$EC2_HOST <<'EOF'
              aws ecr get-login-password --region us-east-1 | \
                docker login --username AWS --password-stdin \
                401713183841.dkr.ecr.us-east-1.amazonaws.com
              cd ~/app
              docker-compose -f docker-compose.prod.yml pull backend
              docker-compose -f docker-compose.prod.yml up -d --no-deps backend
              docker image prune -f
            EOF
          fi
