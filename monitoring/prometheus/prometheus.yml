global:
  scrape_interval: 15s          # How often to pull metrics from each target
  evaluation_interval: 15s      # How often to evaluate alerting rules

rule_files:
  - "rules/alerts.yml"
  - "rules/recording.yml"

scrape_configs:

  # ── FastAPI backend (our app metrics) ──────────────────────────────────────
  - job_name: "medlit-backend"
    static_configs:
      - targets: ["backend:8000"]
    metrics_path: /metrics
    scrape_interval: 15s

  # ── Prometheus itself ──────────────────────────────────────────────────────
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # ── Node Exporter (host CPU, RAM, disk, network) ───────────────────────────
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]

  # ── cAdvisor (per-container metrics) ──────────────────────────────────────
  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]
