groups:
  - name: medlit_alerts
    rules:

      # Fire if the backend has been down for more than 2 minutes
      - alert: BackendDown
        expr: up{job="medlit-backend"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Medical Literature Assistant backend is down"
          description: "The FastAPI backend has been unreachable for 2 minutes."

      # Fire if error rate exceeds 10% over 5 minutes
      - alert: HighErrorRate
        expr: |
          rate(medlit_errors_total[5m]) / rate(medlit_requests_total[5m]) > 0.10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High error rate detected"
          description: "More than 10% of requests are failing."

      # Fire if p99 request latency exceeds 60 seconds
      - alert: HighRequestLatency
        expr: |
          histogram_quantile(0.99,
            rate(medlit_request_latency_seconds_bucket[5m])
          ) > 60
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High request latency"
          description: "99th percentile request latency exceeds 60 seconds."

      # Fire if host memory usage exceeds 85%
      - alert: HighMemoryUsage
        expr: |
          (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Host memory usage is high"
          description: "More than 85% of host RAM is in use."

      # Fire if disk usage exceeds 80%
      - alert: DiskAlmostFull
        expr: |
          (node_filesystem_size_bytes{mountpoint="/"} - node_filesystem_free_bytes{mountpoint="/"})
          / node_filesystem_size_bytes{mountpoint="/"} > 0.80
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Disk usage exceeds 80%"
          description: "The root filesystem is more than 80% full."
