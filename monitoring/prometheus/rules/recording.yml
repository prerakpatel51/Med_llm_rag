groups:
  - name: medlit_recording
    rules:
      # Pre-compute request rate to speed up dashboard queries
      - record: job:medlit_requests:rate5m
        expr: rate(medlit_requests_total[5m])

      # Pre-compute error rate
      - record: job:medlit_errors:rate5m
        expr: rate(medlit_errors_total[5m])

      # Pre-compute p50, p95, p99 latencies
      - record: job:medlit_request_latency_p50:5m
        expr: histogram_quantile(0.50, rate(medlit_request_latency_seconds_bucket[5m]))

      - record: job:medlit_request_latency_p95:5m
        expr: histogram_quantile(0.95, rate(medlit_request_latency_seconds_bucket[5m]))

      - record: job:medlit_request_latency_p99:5m
        expr: histogram_quantile(0.99, rate(medlit_request_latency_seconds_bucket[5m]))
