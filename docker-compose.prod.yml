##############################################################################
# docker-compose.prod.yml – production deployment on EC2 t3.small
#
# Differences from docker-compose.yml:
#   - Backend pulls pre-built image from ECR (no build on EC2)
#   - No Ollama container (GPU managed separately via ec2_manager.py)
#   - No frontend (served from S3/CloudFront)
#   - PostgreSQL and backend run here
#
# On EC2: docker compose -f docker-compose.prod.yml up -d
##############################################################################

services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: medlit-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-medlit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-medlit}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-medlit}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - medlit-net
    command: >
      postgres
      -c shared_buffers=128MB
      -c effective_cache_size=256MB
      -c work_mem=4MB
      -c maintenance_work_mem=64MB
      -c max_connections=50

  # ── Backend (pulled from ECR) ─────────────────────────────────────────────
  backend:
    image: ${ECR_IMAGE}   # set by GitHub Actions: ACCOUNT.dkr.ecr.REGION.amazonaws.com/med-llm-rag-backend:latest
    container_name: medlit-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-medlit}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-medlit}
      GROQ_API_KEY: ${GROQ_API_KEY}
      LLM_MODEL: ${LLM_MODEL:-llama-3.3-70b-versatile}
      NCBI_API_KEY: ${NCBI_API_KEY}
      NCBI_EMAIL: ${NCBI_EMAIL}
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: "false"
      LOG_LEVEL: INFO
    volumes:
      - hf_cache:/app/hf-cache
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - medlit-net

volumes:
  postgres_data:
  hf_cache:

networks:
  medlit-net:
    driver: bridge
